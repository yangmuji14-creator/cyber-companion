<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>赛博伴侣</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="avatar" id="avatar">🌸</div>
        <div class="title-group">
          <div class="title" id="persona-name">赛博伴侣</div>
          <div class="subtitle" id="conn-status">连接中…</div>
        </div>
      </div>
      <button class="icon-btn" id="open-settings" title="设置" aria-label="设置">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- 消息区 -->
    <main class="messages" id="messages">
      <div class="day-divider"><span>今天</span></div>
    </main>

    <!-- 输入区 -->
    <footer class="composer">
      <button class="icon-btn ghost" id="btn-image" title="发送图片" aria-label="发送图片">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <button class="icon-btn ghost" id="btn-voice" title="按住说话" aria-label="语音">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="说点什么…" autocomplete="off"></textarea>
      </div>
      <button class="send-btn" id="btn-send" title="发送" aria-label="发送">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <input type="file" id="file-image" accept="image/*" hidden />
    </footer>
  </div>

  <!-- 设置抽屉 -->
  <div class="drawer-scrim" id="drawer-scrim" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2>设置</h2>
      <button class="icon-btn" id="close-settings" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p class="drawer-hint">调整后即时生效，无需重启。部分项（★）在下次启动生效。</p>
    <form id="settings-form" class="settings-form"></form>
    <div class="drawer-foot">
      <span class="save-status" id="save-status"></span>
      <button class="primary-btn" id="btn-save">保存并应用</button>
    </div>
  </aside>

  <!-- 语音录制浮层 -->
  <div class="voice-overlay" id="voice-overlay" hidden>
    <div class="voice-card">
      <div class="voice-pulse"><span></span><span></span><span></span></div>
      <div class="voice-timer" id="voice-timer">0:00</div>
      <div class="voice-tip">正在录音…松开发送，上滑取消</div>
      <div class="voice-actions">
        <button class="ghost-btn" id="voice-cancel">取消</button>
        <button class="primary-btn" id="voice-stop">发送</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
